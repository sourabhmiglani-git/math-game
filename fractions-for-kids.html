<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Fraction Fun! 🍕</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #e0f4ff;
    --sun: #FFD93D;
    --coral: #FF6B6B;
    --mint: #6BCB77;
    --purple: #845EC2;
    --blue: #4D96FF;
    --orange: #FF9A3C;
    --pink: #FF6FB4;
    --card: #ffffff;
    --text: #2d2d44;
    --shadow: 0 8px 32px rgba(100,80,180,0.13);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--sky);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 10% 20%, #c7eaff 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, #d4f7e0 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, #f9e8ff 0%, transparent 60%);
  }

  /* Floating background shapes */
  .bg-shapes { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .shape {
    position: absolute;
    border-radius: 50%;
    opacity: 0.18;
    animation: floatShape 8s ease-in-out infinite;
  }
  .shape:nth-child(1) { width:120px; height:120px; background:var(--purple); top:5%; left:3%; animation-delay:0s; }
  .shape:nth-child(2) { width:80px; height:80px; background:var(--coral); top:15%; right:6%; animation-delay:1.5s; }
  .shape:nth-child(3) { width:60px; height:60px; background:var(--mint); top:70%; left:7%; animation-delay:3s; }
  .shape:nth-child(4) { width:100px; height:100px; background:var(--sun); bottom:10%; right:4%; animation-delay:2s; }
  .shape:nth-child(5) { width:50px; height:50px; background:var(--blue); top:45%; left:1%; animation-delay:4s; }
  @keyframes floatShape {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-30px) rotate(15deg); }
  }

  /* HEADER */
  header {
    position: relative; z-index: 1;
    text-align: center;
    padding: 28px 20px 10px;
  }
  .logo {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(2.2rem, 7vw, 3.6rem);
    background: linear-gradient(135deg, var(--purple), var(--coral), var(--orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
    filter: drop-shadow(0 2px 6px rgba(132,94,194,0.18));
  }
  .logo-sub {
    font-size: 1.05rem;
    color: #7a6fa8;
    font-weight: 600;
    margin-top: 2px;
  }

  /* LEVEL SELECTOR */
  .level-bar {
    position: relative; z-index: 1;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 14px 16px 0;
  }
  .lvl-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 0.95rem;
    padding: 8px 22px;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
    background: #e8e0ff;
    color: var(--purple);
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(132,94,194,0.1);
    letter-spacing: 0.3px;
  }
  .lvl-btn:hover { transform: scale(1.08); }
  .lvl-btn.active {
    background: linear-gradient(135deg, var(--purple), #b388ff);
    color: white;
    box-shadow: 0 4px 16px rgba(132,94,194,0.35);
    transform: scale(1.05);
  }
  .lvl-btn.l2.active { background: linear-gradient(135deg, var(--blue), #62b0ff); }
  .lvl-btn.l3.active { background: linear-gradient(135deg, var(--coral), var(--orange)); }
  .lvl-btn.l4.active { background: linear-gradient(135deg, var(--mint), #38c964); }

  /* SCORE BAR */
  .score-bar {
    position: relative; z-index: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 18px;
    padding: 14px 20px 0;
    flex-wrap: wrap;
  }
  .score-pill {
    background: white;
    border-radius: 50px;
    padding: 8px 20px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: var(--text);
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .score-pill span { font-size: 1.3rem; }
  .streak-count { color: var(--orange); }
  .correct-count { color: var(--mint); }
  .progress-wrap {
    background: white;
    border-radius: 50px;
    padding: 8px 20px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 160px;
  }
  .progress-bar-outer {
    flex: 1;
    height: 10px;
    background: #eee;
    border-radius: 50px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--pink));
    border-radius: 50px;
    transition: width 0.5s ease;
  }
  .progress-label {
    font-family: 'Fredoka One', cursive;
    font-size: 0.9rem;
    color: #aaa;
    white-space: nowrap;
  }

  /* MAIN CARD */
  .main-wrap {
    position: relative; z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 30px;
  }

  .question-card {
    background: white;
    border-radius: 28px;
    box-shadow: 0 12px 48px rgba(100,80,180,0.14), 0 2px 8px rgba(0,0,0,0.06);
    padding: 32px 28px 28px;
    max-width: 560px;
    width: 100%;
    text-align: center;
    animation: cardIn 0.5s cubic-bezier(.34,1.56,.64,1);
    position: relative;
    overflow: hidden;
  }
  @keyframes cardIn {
    from { opacity:0; transform: scale(0.85) translateY(24px); }
    to { opacity:1; transform: scale(1) translateY(0); }
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--purple), var(--pink), var(--orange), var(--sun));
    border-radius: 28px 28px 0 0;
  }

  .q-number {
    font-family: 'Fredoka One', cursive;
    font-size: 0.88rem;
    color: #bbb;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .difficulty-badge {
    display: inline-block;
    font-family: 'Fredoka One', cursive;
    font-size: 0.8rem;
    padding: 3px 14px;
    border-radius: 50px;
    margin-bottom: 16px;
    letter-spacing: 0.5px;
  }
  .badge-easy { background: #e8fff0; color: var(--mint); }
  .badge-medium { background: #e8f4ff; color: var(--blue); }
  .badge-hard { background: #fff0e8; color: var(--orange); }
  .badge-expert { background: #f0ffe8; color: #38c964; }

  .visual-wrap {
    margin: 10px auto 18px;
    min-height: 70px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* Pie / circle fraction visual */
  .frac-pie {
    filter: drop-shadow(0 3px 8px rgba(0,0,0,0.12));
  }

  /* Pizza slices */
  .pizza-wrap { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
  .pizza-slice {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2.5px solid #ddd;
    transition: transform 0.3s;
  }
  .pizza-slice.filled { border-color: var(--orange); }

  .question-text {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(1.1rem, 3.5vw, 1.35rem);
    font-weight: 800;
    color: var(--text);
    margin-bottom: 22px;
    line-height: 1.5;
  }

  /* Fraction display */
  .frac-display {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    margin: 0 6px;
    vertical-align: middle;
    line-height: 1;
  }
  .frac-display .num, .frac-display .den {
    font-family: 'Fredoka One', cursive;
    font-size: 1.5rem;
    color: var(--purple);
    line-height: 1.1;
  }
  .frac-display .line {
    width: 100%;
    min-width: 28px;
    height: 3px;
    background: var(--purple);
    border-radius: 2px;
    margin: 2px 0;
  }

  /* Answer options */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    max-width: 400px;
    margin: 0 auto;
  }
  .opt-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.25rem;
    padding: 16px 10px;
    border: 3px solid #ece8ff;
    border-radius: 18px;
    background: white;
    color: var(--text);
    cursor: pointer;
    transition: all 0.22s cubic-bezier(.34,1.56,.64,1);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    min-height: 72px;
  }
  .opt-btn:hover:not(:disabled) {
    transform: scale(1.06);
    border-color: var(--purple);
    box-shadow: 0 4px 16px rgba(132,94,194,0.2);
  }
  .opt-btn.correct {
    background: linear-gradient(135deg, #6BCB77, #38c964);
    border-color: #38c964;
    color: white;
    transform: scale(1.09);
    box-shadow: 0 6px 24px rgba(56,201,100,0.35);
  }
  .opt-btn.wrong {
    background: linear-gradient(135deg, #FF6B6B, #ff3d3d);
    border-color: #ff3d3d;
    color: white;
    transform: scale(0.95);
  }
  .opt-btn:disabled { cursor: default; }

  /* Feedback overlay */
  .feedback {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-top: 22px;
    padding: 18px 20px;
    border-radius: 18px;
    animation: feedIn 0.4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes feedIn {
    from { opacity:0; transform:scale(0.8); }
    to { opacity:1; transform:scale(1); }
  }
  .feedback.show { display: flex; }
  .feedback.correct-fb { background: #f0fff5; border: 2.5px solid #6BCB77; }
  .feedback.wrong-fb { background: #fff5f5; border: 2.5px solid var(--coral); }
  .feedback-icon { font-size: 2.5rem; }
  .feedback-msg {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: var(--text);
    text-align: center;
  }
  .feedback-exp {
    font-size: 0.95rem;
    color: #888;
    font-weight: 600;
    text-align: center;
  }

  /* Next button */
  .next-btn {
    margin-top: 16px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    padding: 14px 44px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--purple), #b388ff);
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(132,94,194,0.3);
    transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
    display: none;
    letter-spacing: 0.5px;
  }
  .next-btn:hover { transform: scale(1.07); box-shadow: 0 8px 28px rgba(132,94,194,0.4); }
  .next-btn.show { display: inline-block; animation: feedIn 0.4s ease; }

  /* CELEBRATION overlay */
  .celebrate {
    position: fixed; inset: 0; z-index: 100;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(6px);
  }
  .celebrate.show { display: flex; }
  .celebrate-inner {
    text-align: center;
    animation: cardIn 0.5s cubic-bezier(.34,1.56,.64,1);
    padding: 20px;
  }
  .celebrate-emoji { font-size: 5rem; animation: bounce 0.6s ease infinite alternate; }
  @keyframes bounce { from {transform:translateY(0)} to {transform:translateY(-20px)} }
  .celebrate-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.6rem;
    background: linear-gradient(135deg, var(--purple), var(--coral), var(--orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 14px 0 8px;
  }
  .celebrate-score {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: #555;
    margin-bottom: 20px;
  }
  .celebrate-btn {
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    padding: 14px 44px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--purple), #b388ff);
    color: white;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(132,94,194,0.3);
    margin: 6px;
    transition: transform 0.2s;
  }
  .celebrate-btn:hover { transform: scale(1.06); }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    top: -20px;
    width: 10px; height: 10px;
    border-radius: 2px;
    opacity: 0;
    animation: confettiFall linear forwards;
    z-index: 101;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity:1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity:0; }
  }

  /* Hint bubble */
  .hint-wrap {
    display: flex;
    justify-content: flex-end;
    max-width: 560px;
    width: 100%;
    margin-bottom: 6px;
  }
  .hint-btn {
    background: none;
    border: 2px solid #dde;
    border-radius: 50px;
    padding: 6px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    color: #aaa;
    cursor: pointer;
    transition: all 0.2s;
  }
  .hint-btn:hover { border-color: var(--purple); color: var(--purple); background: #f4f0ff; }
  .hint-bubble {
    display: none;
    background: #fef9ff;
    border: 2px solid #e8d8ff;
    border-radius: 16px;
    padding: 10px 16px;
    max-width: 560px;
    width: 100%;
    font-size: 0.92rem;
    color: #888;
    font-weight: 600;
    margin-bottom: 8px;
    text-align: center;
  }
  .hint-bubble.show { display: block; animation: feedIn 0.3s ease; }

  /* Fraction inline in text */
  .fi { display: inline-flex; flex-direction: column; align-items: center; vertical-align: middle; margin: 0 4px; line-height: 1; }
  .fi .n, .fi .d { font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: var(--purple); line-height: 1.15; }
  .fi .l { width: 100%; min-width: 22px; height: 2.5px; background: var(--purple); border-radius: 2px; margin: 2px 0; }

  /* Responsive */
  @media (max-width: 420px) {
    .question-card { padding: 24px 16px 20px; }
    .options-grid { gap: 9px; }
    .opt-btn { font-size: 1.1rem; min-height: 64px; }
  }
</style>
</head>
<body>

<div class="bg-shapes">
  <div class="shape"></div><div class="shape"></div>
  <div class="shape"></div><div class="shape"></div><div class="shape"></div>
</div>

<header>
  <div class="logo">🍕 Fraction Fun!</div>
  <div class="logo-sub">Learn fractions the yummy way 🎉</div>
</header>

<div class="level-bar">
  <button class="lvl-btn l1 active" onclick="setLevel(1)">🌱 Easy</button>
  <button class="lvl-btn l2" onclick="setLevel(2)">🌊 Medium</button>
  <button class="lvl-btn l3" onclick="setLevel(3)">🔥 Hard</button>
  <button class="lvl-btn l4" onclick="setLevel(4)">⭐ Expert</button>
</div>

<div class="score-bar">
  <div class="score-pill"><span>✅</span> <span class="correct-count" id="correctCount">0</span> correct</div>
  <div class="score-pill"><span>🔥</span> Streak: <span class="streak-count" id="streakCount">0</span></div>
  <div class="progress-wrap">
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="progBar" style="width:0%"></div></div>
    <span class="progress-label" id="progLabel">0 / 10</span>
  </div>
</div>

<div class="main-wrap">
  <div class="hint-wrap">
    <button class="hint-btn" id="hintBtn" onclick="toggleHint()">💡 Hint</button>
  </div>
  <div class="hint-bubble" id="hintBubble"></div>

  <div class="question-card" id="questionCard">
    <div class="q-number" id="qNumber">Question 1</div>
    <div id="diffBadge" class="difficulty-badge badge-easy">Easy</div>
    <div class="visual-wrap" id="visualWrap"></div>
    <div class="question-text" id="questionText"></div>
    <div class="options-grid" id="optionsGrid"></div>
    <div class="feedback" id="feedback">
      <div class="feedback-icon" id="feedIcon"></div>
      <div class="feedback-msg" id="feedMsg"></div>
      <div class="feedback-exp" id="feedExp"></div>
    </div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
  </div>
</div>

<!-- Celebration Screen -->
<div class="celebrate" id="celebrateScreen">
  <div class="celebrate-inner">
    <div class="celebrate-emoji" id="celebEmoji">🎉</div>
    <div class="celebrate-title">Amazing Work!</div>
    <div class="celebrate-score" id="celebScore"></div>
    <button class="celebrate-btn" onclick="restartSameLevel()">🔄 Play Again</button>
    <button class="celebrate-btn" onclick="nextLevel()" id="nextLvlBtn" style="background:linear-gradient(135deg,#FF6B6B,#FF9A3C)">⬆️ Next Level</button>
  </div>
</div>

<script>
// ─── DATA: 100+ Fraction Problems ───────────────────────────────────────────
const PROBLEMS = {
  easy: [
    // Identify the fraction from visual / simple description
    { q: `A pizza is cut into <b>2 equal slices</b>. You eat <b>1 slice</b>. What fraction did you eat?`, opts: ["1/2","1/3","2/3","1/4"], ans: "1/2", hint:"Count: 1 piece out of 2 total pieces.", exp:"1 piece out of 2 = one half (½)!", visual:"pie:1:2" },
    { q: `A pizza is cut into <b>4 slices</b>. You eat <b>1 slice</b>. What fraction did you eat?`, opts: ["1/2","1/4","3/4","2/4"], ans: "1/4", hint:"Count: 1 piece out of 4 total pieces.", exp:"1 out of 4 slices = one quarter (¼)!", visual:"pie:1:4" },
    { q: `A pizza is cut into <b>4 slices</b>. You eat <b>3 slices</b>. What fraction did you eat?`, opts: ["1/4","2/4","3/4","4/4"], ans: "3/4", hint:"3 pieces eaten out of 4 total.", exp:"3 out of 4 = three quarters (¾)!", visual:"pie:3:4" },
    { q: `There are <b>3 apples</b>. You eat <b>1 apple</b>. What fraction did you eat?`, opts: ["1/2","1/3","2/3","1/4"], ans: "1/3", hint:"1 apple eaten out of 3 total apples.", exp:"1 out of 3 = one third (⅓)!", visual:"circles:1:3" },
    { q: `There are <b>3 apples</b>. You eat <b>2 apples</b>. What fraction did you eat?`, opts: ["1/3","1/2","2/3","3/4"], ans: "2/3", hint:"2 eaten out of 3 total.", exp:"2 out of 3 = two thirds!", visual:"circles:2:3" },
    { q: `A chocolate bar has <b>2 pieces</b>. What fraction is <b>BOTH pieces</b>?`, opts: ["1/2","2/2","1/3","0/2"], ans: "2/2", hint:"Both pieces = all of them.", exp:"2 out of 2 = 2/2 = 1 whole!", visual:"pie:2:2" },
    { q: `What fraction of this shape is <b>shaded</b>? (2 shaded out of 6)`, opts: ["2/6","1/2","4/6","1/6"], ans: "2/6", hint:"Count the shaded: 2. Count total: 6.", exp:"2 shaded out of 6 total = 2/6!", visual:"circles:2:6" },
    { q: `A pie is split into <b>6 equal pieces</b>. You take <b>1 piece</b>. What fraction do you have?`, opts: ["1/5","1/6","1/4","2/6"], ans: "1/6", hint:"1 piece from 6 total pieces.", exp:"1 out of 6 = one sixth (⅙)!", visual:"pie:1:6" },
    { q: `You have <b>4 stars</b>, and <b>2 are yellow</b>. What fraction are yellow?`, opts: ["1/4","3/4","2/4","1/2"], ans: "2/4", hint:"2 yellow stars out of 4 total stars.", exp:"2 out of 4 = 2/4 (also equals 1/2)!", visual:"circles:2:4" },
    { q: `What fraction is <b>one whole</b>?`, opts: ["0/1","2/2","1/0","1/2"], ans: "2/2", hint:"A whole means all pieces are taken.", exp:"2/2 means all 2 pieces = 1 whole!", visual:"pie:2:2" },
    { q: `There are <b>5 cookies</b>. You eat <b>1 cookie</b>. What fraction did you eat?`, opts: ["1/4","1/5","2/5","1/6"], ans: "1/5", hint:"1 cookie out of 5 total.", exp:"1 out of 5 = one fifth (⅕)!", visual:"circles:1:5" },
    { q: `Half of <b>8 is 4</b>. What fraction is half?`, opts: ["1/3","2/3","1/2","3/4"], ans: "1/2", hint:"Half means split into 2 equal parts.", exp:"Half = 1/2. Half of 8 is 4!", visual:"circles:4:8" },
    { q: `A pie is cut into <b>4 equal pieces</b>. All pieces are eaten. What fraction is that?`, opts: ["1/4","2/4","3/4","4/4"], ans: "4/4", hint:"All 4 pieces are eaten out of 4.", exp:"4/4 = the whole pie eaten!", visual:"pie:4:4" },
    { q: `What fraction shows <b>zero pieces</b> out of 3?`, opts: ["3/3","1/3","0/3","2/3"], ans: "0/3", hint:"Zero means none. The top number is 0.", exp:"0/3 means nothing was taken out of 3!", visual:"circles:0:3" },
    { q: `A sandwich is cut into <b>2 halves</b>. You eat <b>one half</b>. What fraction is left?`, opts: ["2/2","1/2","0/2","1/3"], ans: "1/2", hint:"1 half left out of 2 halves total.", exp:"1 out of 2 halves = 1/2 remaining!", visual:"pie:1:2" },
  ],
  medium: [

// ─── STATE ──────────────────────────────────────────────────────────────────
let currentLevel = 'easy';
let currentProblems = [];
let currentIndex = 0;
let correctCount = 0;
let streak = 0;
let answered = false;
let totalInSession = 10;
let hintShown = false;

const LEVEL_MAP = { 1:'easy', 2:'medium', 3:'hard', 4:'expert' };
const LEVEL_LABELS = { easy:'Easy', medium:'Medium', hard:'Hard', expert:'Expert' };
const BADGE_CLASS = { easy:'badge-easy', medium:'badge-medium', hard:'badge-hard', expert:'badge-expert' };
const LEVEL_EMOJI = { easy:'🌱', medium:'🌊', hard:'🔥', expert:'⭐' };

const CORRECT_MSGS = [
  ["🎉","Amazing!", "You got it right!"],
  ["⭐","Superstar!", "That's correct!"],
  ["🌟","Brilliant!", "Well done!"],
  ["🎊","Fantastic!", "You're a fraction master!"],
  ["🔥","On Fire!", "Keep it going!"],
  ["🍕","Yummy!", "Right answer!"],
  ["🚀","Blast Off!", "Perfect!"],
];
const WRONG_MSGS = [
  ["😅","Not quite!", ""],
  ["🤔","Almost!", ""],
  ["💪","Try again!", ""],
  ["🌈","Keep going!", ""],
];

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  const pool = [...PROBLEMS[currentLevel]];
  // Shuffle
  for(let i = pool.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]] = [pool[j],pool[i]];
  }
  currentProblems = pool.slice(0, Math.min(totalInSession, pool.length));
  currentIndex = 0;
  correctCount = 0;
  streak = 0;
  answered = false;
  updateScoreBar();
  showQuestion();
}

function setLevel(n) {
  currentLevel = LEVEL_MAP[n];
  document.querySelectorAll('.lvl-btn').forEach((b,i) => {
    b.classList.toggle('active', i === n-1);
  });
  init();
}

// ─── DISPLAY QUESTION ───────────────────────────────────────────────────────
function showQuestion() {
  if(currentIndex >= currentProblems.length) { showCelebration(); return; }
  const p = currentProblems[currentIndex];
  answered = false;
  hintShown = false;

  document.getElementById('hintBubble').classList.remove('show');
  document.getElementById('hintBtn').textContent = '💡 Hint';

  document.getElementById('qNumber').textContent = `Question ${currentIndex+1} of ${currentProblems.length}`;
  const badge = document.getElementById('diffBadge');
  badge.textContent = `${LEVEL_EMOJI[currentLevel]} ${LEVEL_LABELS[currentLevel]}`;
  badge.className = `difficulty-badge ${BADGE_CLASS[currentLevel]}`;

  document.getElementById('questionText').innerHTML = p.q;

  // Visual
  const vw = document.getElementById('visualWrap');
  vw.innerHTML = '';
  if(p.visual) renderVisual(p.visual, vw);

  // Options
  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  // Shuffle options
  const opts = [...p.opts];
  for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = formatFrac(opt);
    btn.addEventListener('click', () => checkAnswer(opt, p.ans, p.exp, btn));
    grid.appendChild(btn);
  });

  // Feedback/next
  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  document.getElementById('nextBtn').className = 'next-btn';

  // Hint
  document.getElementById('hintBubble').dataset.hint = p.hint || '';

  updateProgress();

  // Animate card
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = 'cardIn 0.5s cubic-bezier(.34,1.56,.64,1)';
}

function formatFrac(s) {
  if(!s.includes('/')) return s;
  const [n,d] = s.split('/');
  return `<span class='fi'><span class='n'>${n}</span><span class='l'></span><span class='d'>${d}</span></span>`;
}

// ─── VISUAL RENDERING ───────────────────────────────────────────────────────
function renderVisual(visual, wrap) {
  const [type, filled, total] = visual.split(':');
  const f = parseInt(filled), t = parseInt(total);
  if(t === 0) return;

  if(type === 'pie') {
    // SVG pie chart
    const size = 90;
    const cx = size/2, cy = size/2, r = 36;
    let svg = `<svg class="frac-pie" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">`;

    const colors = ['#845EC2','#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF9A3C','#FF6FB4','#b388ff'];
    const sliceAngle = (2 * Math.PI) / t;

    for(let i = 0; i < t; i++) {
      const startAngle = i * sliceAngle - Math.PI/2;
      const endAngle = (i+1) * sliceAngle - Math.PI/2;
      const x1 = cx + r * Math.cos(startAngle);
      const y1 = cy + r * Math.sin(startAngle);
      const x2 = cx + r * Math.cos(endAngle);
      const y2 = cy + r * Math.sin(endAngle);
      const largeArc = sliceAngle > Math.PI ? 1 : 0;
      const isFilled = i < f;
      const col = isFilled ? colors[i % colors.length] : '#f0eeff';
      const stroke = '#fff';
      if(t === 1) {
        svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${col}" stroke="${stroke}" stroke-width="2"/>`;
      } else {
        svg += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${largeArc},1 ${x2},${y2} Z" fill="${col}" stroke="${stroke}" stroke-width="2"/>`;
      }
    }
    svg += `</svg>`;
    wrap.innerHTML = svg;
  } else if(type === 'circles') {
    const colors = ['#845EC2','#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF9A3C'];
    let html = `<div class='pizza-wrap'>`;
    for(let i=0;i<t;i++){
      const col = i<f ? colors[i%colors.length] : '#f0eeff';
      const border = i<f ? colors[i%colors.length] : '#ccc';
      html += `<div class='pizza-slice ${i<f?"filled":""}' style='background:${col};border-color:${border};'></div>`;
    }
    html += `</div>`;
    wrap.innerHTML = html;
  }
}

// ─── CHECK ANSWER ────────────────────────────────────────────────────────────
function checkAnswer(selected, correct, exp, btn) {
  if(answered) return;
  answered = true;

  const isCorrect = selected === correct;
  const allBtns = document.querySelectorAll('.opt-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    // Highlight correct
    if(b.innerHTML === formatFrac(correct) || b.textContent.trim().replace(/\s/g,'') === correct.replace(/\s/g,'')) {
      // find correct button
    }
  });

  // Mark correct button
  allBtns.forEach(b => {
    const bText = b.textContent.replace(/\s/g,'').trim();
    const cText = correct.replace(/\s/g,'').trim();
    if(bText === cText) b.classList.add('correct');
  });

  if(isCorrect) {
    btn.classList.add('correct');
    correctCount++;
    streak++;
    showFeedback(true, exp);
    spawnConfetti();
  } else {
    btn.classList.add('wrong');
    streak = 0;
    showFeedback(false, exp, correct);
  }
  updateScoreBar();
  document.getElementById('nextBtn').className = 'next-btn show';
}

function showFeedback(correct, exp, correctAns) {
  const fb = document.getElementById('feedback');
  const msgs = correct ? CORRECT_MSGS[Math.floor(Math.random()*CORRECT_MSGS.length)]
                       : WRONG_MSGS[Math.floor(Math.random()*WRONG_MSGS.length)];
  document.getElementById('feedIcon').textContent = msgs[0];
  document.getElementById('feedMsg').textContent = msgs[1];
  let expText = msgs[2];
  if(exp) expText = exp;
  if(!correct && correctAns) expText = `The answer was ${correctAns}. ${exp||''}`;
  document.getElementById('feedExp').textContent = expText;
  fb.className = `feedback show ${correct?'correct-fb':'wrong-fb'}`;
}

// ─── NAVIGATION ─────────────────────────────────────────────────────────────
function nextQuestion() {
  currentIndex++;
  showQuestion();
}

function updateScoreBar() {
  document.getElementById('correctCount').textContent = correctCount;
  document.getElementById('streakCount').textContent = streak;
  updateProgress();
}

function updateProgress() {
  const pct = currentProblems.length > 0 ? (currentIndex / currentProblems.length) * 100 : 0;
  document.getElementById('progBar').style.width = pct + '%';
  document.getElementById('progLabel').textContent = `${currentIndex} / ${currentProblems.length}`;
}

// ─── HINT ────────────────────────────────────────────────────────────────────
function toggleHint() {
  if(answered) return;
  const bubble = document.getElementById('hintBubble');
  const hint = bubble.dataset.hint;
  if(!hint) return;
  const showing = bubble.classList.contains('show');
  bubble.textContent = '💡 ' + hint;
  bubble.classList.toggle('show', !showing);
  document.getElementById('hintBtn').textContent = showing ? '💡 Hint' : '🙈 Hide';
  hintShown = true;
}

// ─── CELEBRATION ─────────────────────────────────────────────────────────────
const CELEBRATE_EMOJIS = ['🎉','🌟','🏆','🎊','🦄','🍕','⭐','🎈'];
function showCelebration() {
  const pct = Math.round((correctCount / currentProblems.length) * 100);
  let emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🌟' : '🎉';
  document.getElementById('celebEmoji').textContent = emoji;
  document.getElementById('celebScore').textContent =
    `You got ${correctCount} out of ${currentProblems.length} correct! (${pct}%)`;
  document.getElementById('celebrateScreen').className = 'celebrate show';

  // Hide next level btn if already expert
  const lvlOrder = ['easy','medium','hard','expert'];
  const idx = lvlOrder.indexOf(currentLevel);
  document.getElementById('nextLvlBtn').style.display = idx < 3 ? '' : 'none';

  spawnConfetti(80);
}

function restartSameLevel() {
  document.getElementById('celebrateScreen').className = 'celebrate';
  init();
}

function nextLevel() {
  const lvlOrder = ['easy','medium','hard','expert'];
  const idx = lvlOrder.indexOf(currentLevel);
  if(idx < 3) {
    document.getElementById('celebrateScreen').className = 'celebrate';
    setLevel(idx + 2); // setLevel is 1-indexed
  }
}

// ─── CONFETTI ────────────────────────────────────────────────────────────────
function spawnConfetti(count = 30) {
  const colors = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#845EC2','#FF9A3C','#FF6FB4'];
  for(let i=0;i<count;i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random()*100+'vw';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.width = (8+Math.random()*8)+'px';
    el.style.height = (8+Math.random()*8)+'px';
    el.style.borderRadius = Math.random()>0.5?'50%':'2px';
    el.style.animationDuration = (1.5+Math.random()*2)+'s';
    el.style.animationDelay = (Math.random()*0.8)+'s';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// ─── START ───────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
